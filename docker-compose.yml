version: '3.8'
services:
  db:
    image: postgres:16
    container_name: fraud_db_container
    environment:
      POSTGRES_USER: vince_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fraud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: