spring.application.name=fraudchecker
# Driver do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Dados da conexão (batendo com o que escrevemos no docker-compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/fraudchecker_db
spring.datasource.username=dev_user
spring.datasource.password=dev_password

# Configurações do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deixe o Flyway gerenciar o schema
spring.jpa.hibernate.ddl-auto=validate

# Opcional: limpa o banco se houver erro (use apenas em desenvolvimento!)
spring.flyway.clean-on-validation-error=true